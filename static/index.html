<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="color-scheme" content="dark" />
  <title>Repertório - IEVV São Miguel — Envio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #2a3142;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --success: #3ba55d;
      --danger: #ed4245;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e2340 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }
    .wrap {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      padding: max(1.25rem, env(safe-area-inset-top, 0px)) max(1rem, env(safe-area-inset-right, 0px)) max(2rem, env(safe-area-inset-bottom, 0px)) max(1rem, env(safe-area-inset-left, 0px));
    }
    header {
      margin-bottom: 1.75rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1rem, 4vw, 1.5rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.875rem;
      font-weight: 600;
    }
    label span.hint {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.8rem;
    }
    input, textarea, select {
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    select.louvor-input,
    .louvor-grid select {
      cursor: pointer;
      min-height: max(2.75rem, 44px);
      width: 100%;
      max-width: 100%;
      color-scheme: dark;
    }
    textarea { min-height: 88px; resize: vertical; }
    input[type="date"] {
      cursor: pointer;
      min-height: max(2.75rem, 44px);
      width: 100%;
      max-width: 100%;
      color-scheme: dark;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.85;
      filter: invert(0.85);
    }
    .titulo-data-row {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: stretch;
    }
    .titulo-data-row .input-titulo {
      flex: 1;
      min-width: 140px;
    }
    .titulo-data-row .input-data-wrap {
      position: relative;
      flex: 0 0 auto;
      min-width: 10.5rem;
      max-width: 100%;
    }
    .titulo-data-row .input-data-wrap .input-data {
      width: 100%;
      min-width: 10.5rem;
    }
    .date-field-placeholder {
      position: absolute;
      left: 0.85rem;
      right: 2.35rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .input-data-wrap:not(.has-value):not(.is-focused) .input-data {
      color: transparent;
    }
    .input-data-wrap.has-value .input-data,
    .input-data-wrap.is-focused .input-data {
      color: var(--text);
    }
    .input-data-wrap:not(.has-value):not(.is-focused) .date-field-placeholder {
      opacity: 1;
    }
    .input-data-wrap.has-value .date-field-placeholder,
    .input-data-wrap.is-focused .date-field-placeholder {
      opacity: 0;
      visibility: hidden;
    }
    .louvores-block {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .louvor-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-start;
    }
    .louvor-card {
      flex: 1;
      min-width: 0;
      width: 100%;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .louvor-title {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.65rem;
    }
    .louvor-grid {
      display: grid;
      gap: 0.65rem;
      width: 100%;
    }
    @media (min-width: 480px) {
      .louvor-grid {
        grid-template-columns: 1.4fr 1fr;
        align-items: end;
      }
      .louvor-row {
        align-items: flex-end;
      }
      .louvor-row .btn-remove {
        margin-top: 1.75rem;
      }
    }
    .louvor-field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 0;
    }
    .louvor-field .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }
    .louvor-row .btn-remove {
      flex-shrink: 0;
      align-self: flex-end;
      margin-top: 0;
      padding: 0.55rem 0.75rem;
      min-height: 44px;
      font-size: 0.8rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .louvor-row .btn-remove:hover {
      color: var(--danger);
      border-color: rgba(237, 66, 69, 0.45);
    }
    .btn-add-louvor {
      align-self: stretch;
      padding: 0.65rem 1rem;
      min-height: 44px;
      font-size: 0.875rem;
      font-weight: 600;
      background: transparent;
      color: var(--accent);
      border: 1px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add-louvor:hover {
      border-color: var(--accent);
      background: rgba(88, 101, 242, 0.08);
    }
    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }
    .row-actions button {
      width: 100%;
      min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }
    button.primary {
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 1.25rem;
      transition: background 0.15s, transform 0.1s;
      background: var(--accent);
      color: #fff;
      flex: none;
    }
    button:active { transform: scale(0.98); }
    button.primary:hover:not(:disabled) { background: var(--accent-hover); }
    button.secondary {
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      padding: 0.85rem 1.25rem;
      transition: background 0.15s, transform 0.1s, color 0.15s, border-color 0.15s;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      flex: none;
    }
    button.secondary:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.show { display: block; }
    .status.ok {
      background: rgba(59, 165, 93, 0.15);
      border: 1px solid rgba(59, 165, 93, 0.4);
      color: #a6e9b8;
    }
    .status.err {
      background: rgba(237, 66, 69, 0.12);
      border: 1px solid rgba(237, 66, 69, 0.35);
      color: #ff9a9c;
    }
    .preview {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: rgba(0, 0, 0, 0.25);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
      font-size: 0.85rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .preview strong { color: var(--text); }

    /* Telas largas: botões lado a lado */
    @media (min-width: 420px) {
      .row-actions {
        flex-direction: row;
        flex-wrap: wrap;
      }
      .row-actions button {
        width: auto;
        flex: 1;
        min-width: 140px;
      }
      .btn-add-louvor {
        align-self: flex-start;
        width: auto;
      }
    }

    /* Evita zoom automático no foco (iOS Safari) em campos com fonte pequena */
    @media (max-width: 480px) {
      input,
      textarea,
      select {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Repertório - IEVV São Miguel</h1>
      <p>Preencha e envie para a mídia. Use “Copiar texto para WhatsApp” para colar no grupo, se quiser.</p>
    </header>

    <form id="form" novalidate>
      <div class="titulo-data-row">
        <input
          type="text"
          name="titulo"
          id="titulo"
          class="input-titulo"
          autocomplete="off"
          placeholder="Ex.: Culto Radicais, Culto Especial, etc."
          aria-label="Título do culto"
        />
        <div class="input-data-wrap" id="data_culto_wrap">
          <input
            type="date"
            name="data_culto"
            id="data_culto"
            class="input-data"
            autocomplete="off"
            aria-label="Data do culto"
          />
          <span class="date-field-placeholder" id="data_culto_placeholder" aria-hidden="true">Data do culto (dd/mm/aaaa)</span>
        </div>
      </div>

      <div class="louvores-block">
        <span class="hint">Sugestão: 3 louvores. Escolha na lista ou digite a música manualmente. O tom é opcional.</span>
        <div id="louvores-container"></div>
        <button type="button" class="btn-add-louvor" id="btnAddLouvor" title="Inclui mais um campo de louvor">+ Adicionar louvor</button>
      </div>

      <label>
        Roupa
        <span class="hint">Cor e tipo de roupa da equipe (opcional)</span>
        <input type="text" name="roupa" id="roupa" autocomplete="off" placeholder="Ex.: branco e azul, social escuro, etc." />
      </label>

      <label>
        Observações
        <span class="hint">Opcional — outras observações além da roupa</span>
        <textarea name="observacoes" id="observacoes" rows="3" placeholder="Ex.: observações gerais sobre o culto, etc."></textarea>
      </label>
      <div class="row-actions">
        <button type="submit" class="primary" id="btnSend">Enviar para mídia</button>
        <button type="button" class="secondary" id="btnCopy">Copiar texto para WhatsApp</button>
      </div>
    </form>

    <div class="status" id="status" role="status"></div>

    <div class="preview" id="preview" aria-live="polite"></div>
  </div>

  <script src="/musicais.js"></script>
  <script>
    (function () {
      const container = document.getElementById("louvores-container");
      let nextIndex = 0;
      const TOM_OPCOES = [
        "C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B",
        "Db", "Eb", "Gb", "Ab", "Bb",
      ];

      function buildLouvorSelect() {
        var sel = document.createElement("select");
        sel.className = "louvor-musica-select louvor-input";
        sel.setAttribute("aria-label", "Selecione a música do louvor");
        var empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "— Selecione uma música —";
        sel.appendChild(empty);
        var list = window.MUSICAS_REPERTORIO;
        if (!list || !list.length) {
          var err = document.createElement("option");
          err.value = "";
          err.textContent = "(Lista não carregou — recarregue a página)";
          err.disabled = true;
          sel.appendChild(err);
          return sel;
        }
        for (var i = 0; i < list.length; i++) {
          var opt = document.createElement("option");
          opt.value = list[i];
          opt.textContent = list[i];
          sel.appendChild(opt);
        }
        return sel;
      }

      function buildTomSelect() {
        var sel = document.createElement("select");
        sel.className = "louvor-tom louvor-input";
        sel.setAttribute("aria-label", "Tom");
        var o0 = document.createElement("option");
        o0.value = "";
        o0.textContent = "— Tom —";
        sel.appendChild(o0);
        for (var i = 0; i < TOM_OPCOES.length; i++) {
          var o = document.createElement("option");
          o.value = TOM_OPCOES[i];
          o.textContent = TOM_OPCOES[i];
          sel.appendChild(o);
        }
        return sel;
      }

      function bindLouvorInputs() {
        container.querySelectorAll(".louvor-row select, .louvor-musica-livre").forEach(function (el) {
          el.removeEventListener("input", updatePreview);
          el.removeEventListener("change", updatePreview);
          el.addEventListener("input", updatePreview);
          el.addEventListener("change", updatePreview);
        });
      }

      function createLouvorRow(removable) {
        nextIndex += 1;
        const n = nextIndex;
        const row = document.createElement("div");
        row.className = "louvor-row";
        row.dataset.louvorSlot = String(n);

        const card = document.createElement("div");
        card.className = "louvor-card";

        const title = document.createElement("span");
        title.className = "louvor-title";
        title.textContent = "Louvor " + n;

        const grid = document.createElement("div");
        grid.className = "louvor-grid";

        const fMus = document.createElement("label");
        fMus.className = "louvor-field louvor-field-musica";
        var lm = document.createElement("span");
        lm.className = "field-label";
        lm.textContent = "Música";
        fMus.appendChild(lm);
        fMus.appendChild(buildLouvorSelect());
        var musLivre = document.createElement("input");
        musLivre.type = "text";
        musLivre.className = "louvor-musica-livre";
        musLivre.autocomplete = "off";
        musLivre.placeholder = "Ou digite a música (caso não esteja na lista)";
        fMus.appendChild(musLivre);

        const fTom = document.createElement("label");
        fTom.className = "louvor-field louvor-field-tom";
        var lt = document.createElement("span");
        lt.className = "field-label";
        lt.textContent = "Tom";
        fTom.appendChild(lt);
        fTom.appendChild(buildTomSelect());

        grid.appendChild(fMus);
        grid.appendChild(fTom);
        card.appendChild(title);
        card.appendChild(grid);
        row.appendChild(card);

        if (removable) {
          const rm = document.createElement("button");
          rm.type = "button";
          rm.className = "btn-remove";
          rm.setAttribute("aria-label", "Remover louvor " + n);
          rm.textContent = "Remover";
          rm.addEventListener("click", function () {
            row.remove();
            renumberLouvorLabels();
            updatePreview();
            bindLouvorInputs();
          });
          row.appendChild(rm);
        }

        container.appendChild(row);
        bindLouvorInputs();
      }

      function renumberLouvorLabels() {
        var rows = container.querySelectorAll(".louvor-row");
        rows.forEach(function (row, i) {
          var t = row.querySelector(".louvor-title");
          if (t) t.textContent = "Louvor " + (i + 1);
        });
      }

      function initLouvores() {
        for (var i = 0; i < 3; i++) createLouvorRow(false);
      }

      document.getElementById("btnAddLouvor").addEventListener("click", function () {
        createLouvorRow(true);
        updatePreview();
      });

      function buildPayload() {
        var louvores = Array.prototype.map.call(container.querySelectorAll(".louvor-row"), function (row) {
          var musEl = row.querySelector(".louvor-musica-select");
          var musLivreEl = row.querySelector(".louvor-musica-livre");
          var tomEl = row.querySelector(".louvor-tom");
          var musicaLivre = musLivreEl ? musLivreEl.value.trim() : "";
          var musicaLista = musEl ? musEl.value.trim() : "";
          return {
            musica: musicaLivre || musicaLista,
            tom: tomEl ? tomEl.value.trim() : "",
          };
        });
        return {
          data_culto: document.getElementById("data_culto").value.trim(),
          titulo: document.getElementById("titulo").value.trim(),
          louvores: louvores,
          roupa: document.getElementById("roupa").value.trim(),
          observacoes: document.getElementById("observacoes").value.trim(),
        };
      }

      function formatDateForDisplay(s) {
        var v = (s || "").trim();
        if (!v) return "";
        var m = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (m) return m[3] + "/" + m[2] + "/" + m[1];
        return v;
      }

      function getCultoTemaByDate(dateRaw) {
        if (!dateRaw) return "";
        var m = dateRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!m) return "Culto";
        var dt = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
        var day = dt.getDay(); // 0=Dom ... 6=Sab
        if (day === 4) return "Culto Quinta";
        if (day === 6) return "Culto Sabado";
        if (day === 0) return "Culto Domingo";
        return "Culto";
      }

      function formatLouvorLine(item) {
        var mus = (item.musica || "").trim();
        var tom = (item.tom || "").trim();
        if (!mus && !tom) return "";
        var line = "• ";
        line += mus || "(música não selecionada)";
        if (tom) line += " — Tom: " + tom;
        return line;
      }

      function formatMessage(p) {
        var dataRaw = formatDateForDisplay(p.data_culto);
        var titulo = (p.titulo || "").trim();
        var tema;
        if (titulo && dataRaw) tema = titulo + " - " + dataRaw;
        else if (dataRaw) tema = getCultoTemaByDate((p.data_culto || "").trim()) + " - " + dataRaw;
        else tema = "(data obrigatória)";
        var roupa = (p.roupa || "").trim();
        var lines = (p.louvores || []).map(formatLouvorLine).filter(Boolean);
        var louvoresFmt = lines.length ? lines.join("\n") : "• (não informado)";
        var out = "**" + tema + "** 🎵\n\n**Repertório**\n" + louvoresFmt;
        if (roupa) out += "\n\n**Roupa:**\n" + roupa;
        if (p.observacoes) out += "\n\n**Observações:**\n" + p.observacoes;
        return out;
      }

      function hasAtLeastOneMusic(payload) {
        return (payload.louvores || []).some(function (item) {
          return !!(item && (item.musica || "").trim());
        });
      }

      /** Discord usa **negrito**; WhatsApp usa *negrito* */
      function discordBoldToWhatsApp(s) {
        return s.replace(/\*\*(.+?)\*\*/g, "*$1*");
      }

      function updatePreview() {
        var el = document.getElementById("preview");
        var raw = formatMessage(buildPayload());
        el.textContent = raw.replace(/\*\*(.*?)\*\*/g, "$1");
      }

      function syncDatePlaceholder() {
        var el = document.getElementById("data_culto");
        var wrap = document.getElementById("data_culto_wrap");
        if (!el || !wrap) return;
        wrap.classList.toggle("has-value", !!el.value);
        wrap.classList.toggle("is-focused", document.activeElement === el);
      }

      var dataCultoEl = document.getElementById("data_culto");
      dataCultoEl.addEventListener("input", function () {
        syncDatePlaceholder();
        updatePreview();
      });
      dataCultoEl.addEventListener("change", function () {
        syncDatePlaceholder();
        updatePreview();
      });
      dataCultoEl.addEventListener("focus", function () {
        syncDatePlaceholder();
      });
      dataCultoEl.addEventListener("blur", function () {
        syncDatePlaceholder();
      });
      document.getElementById("titulo").addEventListener("input", updatePreview);
      document.getElementById("roupa").addEventListener("input", updatePreview);
      document.getElementById("observacoes").addEventListener("input", updatePreview);

      dataCultoEl.addEventListener("click", function () {
        if (typeof this.showPicker === "function") {
          try {
            this.showPicker();
          } catch (_) {}
        }
      });

      initLouvores();
      syncDatePlaceholder();
      updatePreview();

      function setStatus(ok, text) {
        var s = document.getElementById("status");
        s.className = "status show " + (ok ? "ok" : "err");
        s.textContent = text;
      }
      function hideStatus() {
        var s = document.getElementById("status");
        s.className = "status";
      }

      document.getElementById("form").addEventListener("submit", async function (e) {
        e.preventDefault();
        hideStatus();
        var payload = buildPayload();
        if (!payload.data_culto) {
          setStatus(false, "Data do culto é obrigatória para enviar.");
          return;
        }
        if (!hasAtLeastOneMusic(payload)) {
          setStatus(false, "Pelo menos uma música é obrigatória para enviar.");
          return;
        }
        var btn = document.getElementById("btnSend");
        btn.disabled = true;
        try {
          var res = await fetch("/api/repertorio", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          var j = await res.json().catch(function () {
            return {};
          });
          if (!res.ok || !j.ok) {
            setStatus(false, j.error || "Falha ao enviar. Verifique o servidor e o webhook.");
          } else {
            setStatus(true, "Enviado para a mídia com sucesso.");
          }
        } catch (err) {
          setStatus(false, "Não foi possível conectar ao servidor. Inicie o app (Python) e tente de novo.");
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById("btnCopy").addEventListener("click", async function () {
        var payload = buildPayload();
        if (!payload.data_culto) {
          setStatus(false, "Data do culto é obrigatória para copiar.");
          return;
        }
        if (!hasAtLeastOneMusic(payload)) {
          setStatus(false, "Pelo menos uma música é obrigatória para copiar.");
          return;
        }
        var text = discordBoldToWhatsApp(formatMessage(payload));
        try {
          await navigator.clipboard.writeText(text);
          setStatus(true, "Texto copiado. Cole no WhatsApp.");
        } catch (e) {
          setStatus(false, "Não foi possível copiar. Selecione a pré-visualização abaixo manualmente.");
        }
      });
    })();
  </script>
